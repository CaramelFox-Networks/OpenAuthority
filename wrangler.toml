name = "openauthority-api"
main = "src/index.ts"
compatibility_date = "2026-05-14"

routes = [
  { pattern = "openauthority.dev/api/*", zone_name = "openauthority.dev" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "openauthority-db"
database_id = "13d0025d-5ecd-4c72-8a0e-a56e77daf4a5"

# KV Namespace for rate limiting (optional but recommended)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5e8cdcf2b1434a42925ba35bc27cab5e"

# Cron trigger for periodic verification (runs every half hour)
[triggers]
crons = ["*/30 * * * *"]

[vars]
