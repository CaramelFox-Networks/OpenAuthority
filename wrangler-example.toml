name = "CHANGE-ME"
main = "src/index.ts"
compatibility_date = "2026-05-14"

routes = [
  { pattern = "change.me/api/*", zone_name = "change.me" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "CHANGE-ME"
database_id = "CHANGE-ME"

# KV Namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "CHANGE-ME"

# Cron trigger for periodic verification (runs every half hour)
[triggers]
crons = ["*/30 * * * *"]

[vars]

